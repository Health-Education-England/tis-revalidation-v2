@if (submitting) {
  <div
    class="d-flex align-content-center justify-content-center align-items-center progress-spinner"
  >
    <mat-spinner></mat-spinner>
  </div>
} @else if (connectionHistory$ | async) {
  @if ((hiddenDiscrepancies$ | async)?.length) {
    <app-connection-hidden-discrepancies
      [updatingDiscrepancyIds]="updatingDiscrepancyIds"
      data-testid="component-hidden-discrepancies"
      [hiddenDiscrepanciesColumnsToDisplay]="
        hiddenDiscrepanciesColumnsToDisplay
      "
      [hiddenDiscrepancies]="hiddenDiscrepancies$ | async"
      (showDiscrepancy)="showDiscrepancy($event)"
    ></app-connection-hidden-discrepancies>
  }

  <mat-card class="mb-20" appearance="outlined">
    <mat-card-title>Current designated body</mat-card-title>
    <ng-container *ngIf="doctorCurrentDbc$ | async; else NoDBC">
      {{ doctorCurrentDbc$ | async | formatDesignatedBody: "name" }}
    </ng-container>
    <ng-template #NoDBC> No current connection </ng-template>
  </mat-card>

  <app-connection-history
    [connectionsColumnsToDisplay]="connectionsColumnsToDisplay"
    [connectionHistory]="connectionHistory$ | async"
  ></app-connection-history>
  @if (enableUpdateConnection && !(hiddenDiscrepancies$ | async)?.length) {
    <app-update-connection
      [currentDoctorDbcCode]="doctorCurrentDbc"
      (submittFormEvent)="updateConnection($event)"
    >
    </app-update-connection>
  }
}
